<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações do Grupo</title>
    <link rel="stylesheet" href="style.css"></head>
<body>
    <div class="container">
        <h1>Informações do Grupo</h1>
        
        <form id="form-contato">
            <div class="form-group">
                <label for="nome1">Nome 1:</label>
                <input type="text" id="nome1" name="nome1" required>
            </div>
            
            <div class="form-group">
                <label for="nome2">Nome 2:</label>
                <input type="text" id="nome2" name="nome2" required>
            </div>
            
            <div class="form-group">
                <label for="nome3">Nome 3:</label>
                <input type="text" id="nome3" name="nome3" required>
            </div>
            
            <div class="form-group">
                <label for="nome4">Nome 4:</label>
                <input type="text" id="nome4" name="nome4" required>
            </div>

            <div class="form-group">
                <label for="nome4">Nome 5:</label>
                <input type="text" id="nome5" name="nome5" required>
            </div>
            
            <div class="form-group">
                <label for="historico">Histórico do Grupo:</label>
                <textarea id="historico" name="historico" required></textarea>
            </div>
            
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
<footer>
    <script src="script.js"></script>
</footer>
</html>
